<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-8 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-2">Login</h1>
                    <p class="text-secondary mb-4">Sign in to continue.</p>

                    <div class="alert alert-danger" th:if="${param.error}">
                        Invalid username or password.
                    </div>

                    <div class="alert alert-success" th:if="${param.logout}">
                        You have been logged out.
                    </div>

                    <div class="alert alert-success" th:if="${param.registered}">
                        Registration successful. You can now log in.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label" for="username">Username</label>
                            <input class="form-control" id="username" name="username" type="text" autocomplete="username" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Login</button>
                    </form>

                    <p class="small text-secondary mt-3 mb-2">
                        Demo credentials: <strong>admin</strong> / <strong>admin123</strong>
                    </p>
                    <p class="mb-0">
                        No account yet? <a th:href="@{/register}">Register</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
