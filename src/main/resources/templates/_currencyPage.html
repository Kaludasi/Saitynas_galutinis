<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Currency Exchange</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{_header :: _header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-7">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-2 text-center">Currency exchange</h1>
                    <p class="text-secondary text-center mb-4">Convert one currency to another.</p>

                    <form id="currencyForm">
                        <div class="mb-3">
                            <label class="form-label" for="amount">Amount</label>
                            <input id="amount" type="number" step="0.01" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="fromCurrency">From currency</label>
                            <select id="fromCurrency" class="form-select">
                                <option th:each="currency : ${currencies}" th:value="${currency}" th:text="${currency}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="toCurrency">To currency</label>
                            <select id="toCurrency" class="form-select">
                                <option th:each="currency : ${currencies}" th:value="${currency}" th:text="${currency}"></option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Convert</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center mt-4">
        <div class="col-12 col-lg-8 col-xl-7">
            <div class="card shadow-sm" id="resultBlock" style="display: none;">
                <div class="card-body p-4 text-center">
                    <h2 class="h5 mb-3">Result</h2>
                    <p class="mb-0" id="resultText"></p>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    $("#currencyForm").submit(function (event) {
        event.preventDefault();

        const request = {
            amount: $("#amount").val(),
            fromCurrency: $("#fromCurrency").val(),
            toCurrency: $("#toCurrency").val()
        };

        $.ajax({
            url: "/api/currency/exchange",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(request),
            success: function (data) {
                $("#resultBlock").show();

                $("#resultText").text(
                    data.amount + " " + data.fromCurrency +
                    " = " +
                    data.convertedAmount + " " + data.toCurrency
                );
            },
            error: function () {
                alert("Currency exchange failed");
            }

        });
    });
</script>
</body>
</html>
