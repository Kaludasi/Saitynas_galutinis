<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Currency Exchange</title>
    <meta name="api_token" th:content="${apiToken}">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{_header :: _header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-7">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-2 text-center">Currency exchange</h1>
                    <p class="text-secondary text-center mb-4">Move funds from one account to another in a different currency.</p>

                    <form id="currencyForm">
                        <div class="mb-3">
                            <label class="form-label" for="amount">Amount</label>
                            <input id="amount" type="number" step="0.01" min="0.01" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="sourceAccountId">From account</label>
                            <select id="sourceAccountId" class="form-select" required>
                                <option value="">Select account</option>
                                <option
                                        th:each="account : ${accounts}"
                                        th:value="${account.id}"
                                        th:text="${account.iban + ' | ' + account.currency + ' | Balance: ' + account.balance}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="targetAccountId">To account</label>
                            <select id="targetAccountId" class="form-select" required>
                                <option value="">Select account</option>
                                <option
                                        th:each="account : ${accounts}"
                                        th:value="${account.id}"
                                        th:text="${account.iban + ' | ' + account.currency + ' | Balance: ' + account.balance}">
                                </option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Convert</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center mt-4">
        <div class="col-12 col-lg-8 col-xl-7">
            <div class="card shadow-sm" id="resultBlock" style="display: none;">
                <div class="card-body p-4 text-center">
                    <h2 class="h5 mb-3">Result</h2>
                    <p class="mb-2" id="resultText"></p>
                    <p class="mb-0 text-secondary small" id="balanceText"></p>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    const apiToken = $('meta[name="api_token"]').attr("content");
    let allAccounts = [];

    function renderAccountOptions(selectId, accounts, selectedValue, excludedValue) {
        const select = $("#" + selectId);
        select.empty();
        select.append('<option value="">Select account</option>');

        accounts.forEach(function (account) {
            if (excludedValue && String(account.id) === String(excludedValue)) {
                return;
            }

            const optionText = account.iban + " | " + account.currency + " | Balance: " + account.balance;
            const option = $("<option></option>")
                .val(account.id)
                .text(optionText);

            if (String(account.id) === String(selectedValue)) {
                option.prop("selected", true);
            }

            select.append(option);
        });
    }

    function syncAccountSelects() {
        const selectedSource = $("#sourceAccountId").val();
        const selectedTarget = $("#targetAccountId").val();

        renderAccountOptions("sourceAccountId", allAccounts, selectedSource, selectedTarget);
        renderAccountOptions("targetAccountId", allAccounts, selectedTarget, selectedSource);

        if (selectedSource && $("#sourceAccountId").val() !== String(selectedSource)) {
            $("#sourceAccountId").val("");
        }

        if (selectedTarget && $("#targetAccountId").val() !== String(selectedTarget)) {
            $("#targetAccountId").val("");
        }
    }

    function refreshAccounts() {
        $.ajax({
            url: "/api/accounts",
            type: "GET",
            beforeSend: function (xhr) {
                xhr.setRequestHeader("Authorization", "Bearer " + apiToken);
            },
            success: function (accounts) {
                allAccounts = accounts;
                syncAccountSelects();
            }
        });
    }

    $("#sourceAccountId").on("change", syncAccountSelects);
    $("#targetAccountId").on("change", syncAccountSelects);

    refreshAccounts();

    $("#currencyForm").submit(function (event) {
        event.preventDefault();

        const request = {
            sourceAccountId: $("#sourceAccountId").val(),
            targetAccountId: $("#targetAccountId").val(),
            amount: $("#amount").val(),
            fromCurrency: null,
            toCurrency: null
        };

        $.ajax({
            url: "/api/currency/exchange",
            type: "POST",
            contentType: "application/json",
            beforeSend: function (xhr) {
                xhr.setRequestHeader("Authorization", "Bearer " + apiToken);
            },
            data: JSON.stringify(request),
            success: function (data) {
                $("#resultBlock").show();

                $("#resultText").text(
                    data.amount + " " + data.fromCurrency +
                    " = " +
                    data.convertedAmount + " " + data.toCurrency
                );
                $("#balanceText").text(
                    "Source balance: " + data.sourceBalance + " " + data.fromCurrency +
                    " | Target balance: " + data.targetBalance + " " + data.toCurrency
                );
                refreshAccounts();
            },
            error: function (xhr) {
                const message = xhr.responseText || "Currency exchange failed";
                alert(message + (xhr.status ? " (" + xhr.status + ")" : ""));
            }

        });
    });
</script>
</body>
</html>
