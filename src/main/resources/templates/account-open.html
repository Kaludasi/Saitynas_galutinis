<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open Account</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{_header :: _header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-sm-12 col-md-9 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-2">Open account</h1>
                    <p class="text-secondary mb-4">Create a new account for the currently authorized user.</p>

                    <div class="alert alert-danger d-none" id="accountError"></div>

                    <form id="accountOpenForm">
                        <div class="mb-4">
                            <label class="form-label" for="currency">Currency</label>
                            <select class="form-select" id="currency" required>
                                <option value="">Select currency</option>
                                <option th:each="currency : ${supportedCurrencies}" th:value="${currency}" th:text="${currency}"></option>
                            </select>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Open account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    const csrfToken = $('meta[name="_csrf"]').attr("content");
    const csrfHeader = $('meta[name="_csrf_header"]').attr("content");

    $("#accountOpenForm").submit(function (event) {
        event.preventDefault();

        $("#accountError").addClass("d-none").text("");

        $.ajax({
            url: "/api/accounts",
            type: "POST",
            contentType: "application/json",
            beforeSend: function (xhr) {
                xhr.setRequestHeader(csrfHeader, csrfToken);
            },
            data: JSON.stringify({
                currency: $("#currency").val()
            }),
            success: function () {
                window.location.href = "/accounts";
            },
            error: function (xhr) {
                $("#accountError").removeClass("d-none").text(xhr.responseText || "Unable to open account.");
            }
        });
    });
</script>
</body>
</html>
