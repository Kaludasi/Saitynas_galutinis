services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: saitynas-postgres
    environment:
      POSTGRES_DB: saitynas_db
      POSTGRES_USER: saitynas_user
      POSTGRES_PASSWORD: saitynas_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saitynas_user -d saitynas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
