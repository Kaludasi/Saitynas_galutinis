<div th:fragment="_header">
    <header class="border-bottom bg-white">
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand fw-semibold" th:href="@{/main}">BANK</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                        aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNavbar">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/main}">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/payment}">Payments</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/payment/transfer}">Create new payment</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/accounts}">Accounts</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/currency}">Currency</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/swagger-ui.html}" target="_blank" rel="noopener noreferrer">Swagger</a>
                        </li>
                    </ul>

                    <form th:action="@{/logout}" method="post" class="d-flex">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Log out</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>
</div>
