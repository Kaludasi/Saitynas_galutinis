<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Currency Exchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="_header :: _header"></div>

<div class="container mt-5">
    <h1>Currency Exchange</h1>

    <form id="currencyForm">
        <div class="mb-3">
            <label for="amount">Amount</label>
            <input  id="amount" type="number" step="0.01" class="form-control">
        </div>

        <div class="mb-3">
            <label for="fromCurrency">From Currency</label>
            <select id="fromCurrency" class="form-control">
                <option th:each="currency : ${currencies}" th:value="${currency}" th:text="${currency}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="toCurrency">To Currency</label>
            <select id="toCurrency" class="form-control">
                <option th:each="currency : ${currencies}" th:value="${currency}" th:text="${currency}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Exchange</button>
    </form>

        <div class="mt-4" id="resultBlock" style="display: none;">
            <h3>Result</h3>
            <p id="resultText">
            </p>
        </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    $("#currencyForm").submit(function (event) {
        event.preventDefault();

        const request = {
            amount: $("#amount").val(),
            fromCurrency: $("#fromCurrency").val(),
            toCurrency: $("#toCurrency").val()
        };

        $.ajax({
            url: "/api/currency/exchange",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(request),
            success: function (data) {
                $("#resultBlock").show();

                $("#resultText").text(
                    data.amount + " " + data.fromCurrency +
                    " = " +
                    data.convertedAmount + " " + data.toCurrency
                );
            },
            error: function () {
                alert("Currency exchange failed");
            }

        });
    });
</script>
</body>
</html>
