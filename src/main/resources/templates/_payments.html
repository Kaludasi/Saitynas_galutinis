<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Banking System - Payments</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{_header :: _header}"></div>

<main class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
                <div>
                    <h1 class="h3 mb-2">Payment history</h1>
                    <p class="text-secondary mb-0">Recent transfers sorted from newest to oldest.</p>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Sender Account</th>
                        <th>Receiver Account</th>
                        <th>Amount</th>
                        <th>Currency</th>
                        <th>Status</th>
                        <th>Description</th>
                        <th>Created At</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(payments)}">
                        <td colspan="8" class="text-center text-muted py-4">No payments available yet.</td>
                    </tr>
                    <tr th:each="payment : ${payments}">
                        <td th:text="${payment.id}"></td>
                        <td th:text="${payment.senderAccount}"></td>
                        <td th:text="${payment.receiverAccount}"></td>
                        <td class="fw-semibold" th:text="${payment.amount}"></td>
                        <td th:text="${payment.currency}"></td>
                        <td><span class="badge text-bg-secondary" th:text="${payment.status}"></span></td>
                        <td th:text="${payment.description} ?: '-'"></td>
                        <td th:text="${payment.createdAt}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
