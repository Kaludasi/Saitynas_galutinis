<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Banking System - Accounts</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{_header :: _header}"></div>

<main class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
                <div>
                    <h1 class="h3 mb-2">Account balances</h1>
                    <p class="text-secondary mb-0">Current balances for your accounts.</p>
                </div>
                <a class="btn btn-primary" th:href="@{/accounts/new}">Open account</a>
            </div>

            <div class="alert alert-success" th:if="${accountSuccess}" th:text="${accountSuccess}"></div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>IBAN</th>
                        <th>Username</th>
                        <th>Balance</th>
                        <th>Currency</th>
                        <th>Created At</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(accounts)}">
                        <td colspan="6" class="text-center text-muted py-4">No accounts available yet.</td>
                    </tr>
                    <tr th:each="account : ${accounts}">
                        <td th:text="${account.id}"></td>
                        <td th:text="${account.iban}"></td>
                        <td th:text="${account.ownerName}"></td>
                        <td class="fw-semibold" th:text="${account.balance}"></td>
                        <td><span class="badge text-bg-light border" th:text="${account.currency}"></span></td>
                        <td th:text="${account.createdAt}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
