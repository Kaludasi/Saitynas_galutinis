<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bank-login-page">
<div class="bank-login-shell">
    <div class="bank-login-card shadow-lg">
        <p class="bank-login-eyebrow">Simple authorization</p>
        <h1 class="bank-login-title">Create your BANK account</h1>
        <p class="bank-login-subtitle">Registration uses JPA for user persistence, while Liquibase still owns the schema.</p>

        <div class="alert alert-danger" th:if="${registrationError}" th:text="${registrationError}"></div>

        <form th:action="@{/register}" th:object="${registrationForm}" method="post" class="bank-login-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" id="username" th:field="*{username}" type="text" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" th:field="*{email}" type="email" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" th:field="*{password}" type="password" required>
            </div>

            <div class="mb-4">
                <label class="form-label" for="confirmPassword">Confirm password</label>
                <input class="form-control" id="confirmPassword" th:field="*{confirmPassword}" type="password" required>
            </div>

            <button class="btn btn-primary w-100 bank-login-button" type="submit">Register</button>
        </form>

        <div class="bank-login-footer">
            Already have an account? <a th:href="@{/login}">Back to login</a>.
        </div>
    </div>
</div>
</body>
</html>
