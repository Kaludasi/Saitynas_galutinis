<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-8 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-2">Register</h1>
                    <p class="text-secondary mb-4">Create a new account.</p>

                    <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:errors="*{global}"></div>

                    <form th:action="@{/register}" th:object="${registrationForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label" for="username">Username</label>
                            <input class="form-control" id="username" th:field="*{username}" type="text" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" id="email" th:field="*{email}" type="email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" th:field="*{password}" type="password" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="confirmPassword">Confirm password</label>
                            <input class="form-control" id="confirmPassword" th:field="*{confirmPassword}" type="password" required>
                        </div>

                        <hr class="my-4">
                        <h2 class="h5 mb-3">First account</h2>

                        <div class="mb-4">
                            <label class="form-label" for="accountCurrency">Account currency</label>
                            <select class="form-select" id="accountCurrency" th:field="*{accountCurrency}" required>
                                <option value="">Select currency</option>
                                <option th:each="currency : ${supportedCurrencies}" th:value="${currency}" th:text="${currency}"></option>
                            </select>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Register</button>
                    </form>

                    <p class="mt-3 mb-0">
                        Already have an account? <a th:href="@{/login}">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
