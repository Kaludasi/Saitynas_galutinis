<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bank-login-page">
<div class="bank-login-shell">
    <div class="bank-login-card shadow-lg">
        <p class="bank-login-eyebrow">Simple authorization</p>
        <h1 class="bank-login-title">Sign in to BANK</h1>
        <p class="bank-login-subtitle">Use the seeded demo account to access payments and currency pages.</p>

        <div class="alert alert-danger" th:if="${param.error}">
            Invalid username or password.
        </div>

        <div class="alert alert-success" th:if="${param.logout}">
            You have been logged out.
        </div>

        <div class="alert alert-success" th:if="${param.registered}">
            Registration successful. You can now log in.
        </div>

        <form th:action="@{/login}" method="post" class="bank-login-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" id="username" name="username" type="text" autocomplete="username" required>
            </div>

            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
            </div>

            <button class="btn btn-primary w-100 bank-login-button" type="submit">Login</button>
        </form>

        <div class="bank-login-hint">
            Demo credentials: <strong>admin</strong> / <strong>admin123</strong>
        </div>

        <div class="bank-login-footer">
            No account yet? <a th:href="@{/register}">Create one here</a>.
        </div>
    </div>
</div>
</body>
</html>
