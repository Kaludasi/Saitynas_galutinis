<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Banking System - Payments</title>
</head>
<body>
<div th:replace="_header :: _header"></div>

<div class="container mt-5">
    <h1 style="text-align: center">PAYMENTS</h1>
    <div class="text-end">
    <a href="/payments/new" class="btn btn-primary mb-3" style="justify-items: right">New Payment</a>
    </div>
        <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Sender Account</th>
            <th>Receiver Account</th>
            <th>Amount</th>
            <th>Currency</th>
            <th>Status</th>
            <th>Description</th>
            <th>Created At</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.id}"></td>
            <td th:text="${payment.senderAccount}"></td>
            <td th:text="${payment.receiverAccount}"></td>
            <td th:text="${payment.amount}"></td>
            <td th:text="${payment.currency}"></td>
            <td th:text="${payment.status}"></td>
            <td th:text="${payment.description}"></td>
            <td th:text="${payment.createdAt}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
